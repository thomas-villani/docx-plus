name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --python 3.13 --extra dev

      - name: ruff check
        run: uv run ruff check docx_plus/ tests/

      - name: ruff format --check
        run: uv run ruff format --check docx_plus/ tests/

  typecheck:
    name: Type check (mypy --strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --python 3.13 --extra dev

      - name: mypy --strict
        run: uv run mypy --strict docx_plus/

  min-deps:
    name: Lower-bound deps (python-docx==1.0.0, lxml==4.9.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.10

      - name: Sync dependencies
        # Pin runtime deps to their declared minimums in pyproject.toml so
        # we exercise the lower bound users might pin against. Dev deps
        # stay floating.
        run: |
          uv sync --python 3.10 --extra dev
          uv pip install "python-docx==1.0.0" "lxml==4.9.0"

      - name: Run pytest
        run: uv run --python 3.10 pytest -q --no-cov

  test:
    name: Test ${{ matrix.os }} / Python ${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        include:
          # Windows job — the primary dev box runs Windows, so this catches
          # path-handling and lxml CRLF behaviour that Linux-only CI misses.
          - os: windows-latest
            python-version: "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Install LibreOffice (for Layer 3 smoke tests)
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libreoffice

      - name: Run pytest with coverage
        # SPEC §13 gate: ≥90% on core/, styles/, controls/. Enforced via
        # `fail_under = 90` in pyproject.toml's [tool.coverage.report]; the
        # `--cov-fail-under=90` here is redundant insurance.
        run: uv run --python ${{ matrix.python-version }} pytest --cov=docx_plus --cov-report=term --cov-report=xml --cov-fail-under=90

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.13'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  build:
    name: Build wheel + sdist (smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Build distribution
        run: uv build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*
          if-no-files-found: error
