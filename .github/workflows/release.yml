name: Release

# Fires on a tag push matching v0.1.0, v1.2.3, etc. The tag is the
# release trigger — the version in pyproject.toml should already match
# before tagging.
on:
  push:
    tags:
      - "v*.*.*"

# `id-token: write` is required for PyPI trusted publishing.
permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test ${{ matrix.python-version }} (release gate)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: true
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Run pytest with coverage
        run: uv run --python ${{ matrix.python-version }} pytest --cov=docx_plus --cov-fail-under=90

  typecheck:
    name: mypy --strict (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --python 3.13 --extra dev

      - name: mypy --strict
        run: uv run mypy --strict docx_plus/

  lint:
    name: ruff (release gate)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --python 3.13 --extra dev

      - name: ruff check
        run: uv run ruff check docx_plus/ tests/

      - name: ruff format --check
        run: uv run ruff format --check docx_plus/ tests/

  build:
    name: Build distribution artifacts
    needs: [test, typecheck, lint]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.13

      - name: Verify tag matches pyproject version
        # Belt-and-braces: stop early if someone tags v0.2.0 while
        # pyproject still says version = "0.1.0". Python is used (not
        # sed) so the check is identical on Linux and Windows runners
        # and a malformed regex can't silently pass.
        shell: python
        env:
          GITHUB_REF: ${{ github.ref }}
        run: |
          import os
          import sys
          import tomllib

          tag_ref = os.environ["GITHUB_REF"]
          tag_version = tag_ref.removeprefix("refs/tags/v")
          with open("pyproject.toml", "rb") as f:
              project_version = tomllib.load(f)["project"]["version"]
          if tag_version != project_version:
              print(
                  f"::error::Tag v{tag_version} does not match "
                  f"pyproject.toml version {project_version}"
              )
              sys.exit(1)
          print(f"Tag and pyproject.toml agree on version {tag_version}")

      - name: Build distribution
        run: uv build

      - name: Upload built artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/*
          if-no-files-found: error

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      # The 'pypi' GitHub environment scopes the trusted-publishing claim.
      # Configure under Repo Settings → Environments before the first run.
      name: pypi
      url: https://pypi.org/p/docx_plus
    steps:
      - name: Download built artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        # Trusted publishing: configure the repo as a publisher at
        # https://pypi.org/manage/account/publishing/ — no API token in
        # secrets. Falls back to UV_PUBLISH_TOKEN if you prefer the
        # token-based path; comment out the action below and add
        #   run: uv publish --token "${{ secrets.PYPI_API_TOKEN }}"
        uses: pypa/gh-action-pypi-publish@release/v1
