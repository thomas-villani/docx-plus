site_name: docx_plus
site_description: OOXML-level extensions for python-docx — style cascade, controls, fields, comments, tracked changes, layout, bookmarks, notes, publishing.
site_author: Tom Villani, PhD

docs_dir: docs

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

nav:
  - Home: index.md
  - Architecture: ARCHITECTURE.md
  - API Index: API.md
  - CLI: cli.md
  - Agent Skill: SKILLS.md
  - Reference:
      - docx_plus.core.errors: reference/core-errors.md
      - docx_plus.core.ns: reference/core-ns.md
      - docx_plus.core.oxml: reference/core-oxml.md
      - docx_plus.core.ids: reference/core-ids.md
      - docx_plus.core.parts: reference/core-parts.md
      - docx_plus.styles.inspect: reference/styles-inspect.md
      - docx_plus.styles.modify: reference/styles-modify.md
      - docx_plus.styles.theme: reference/styles-theme.md
      - docx_plus.controls.builder: reference/controls-builder.md
      - docx_plus.controls.read: reference/controls-read.md
      - docx_plus.fields.simple: reference/fields-simple.md
      - docx_plus.fields.update: reference/fields-update.md
      - docx_plus.protection.document: reference/protection-document.md
      - docx_plus.comments.anchor: reference/comments-anchor.md
      - docx_plus.comments.read: reference/comments-read.md
      - docx_plus.comments.registry: reference/comments-registry.md
      - docx_plus.revisions.settings: reference/revisions-settings.md
      - docx_plus.revisions.mark: reference/revisions-mark.md
      - docx_plus.revisions.read: reference/revisions-read.md
      - docx_plus.revisions.accept: reference/revisions-accept.md
      - docx_plus.revisions.registry: reference/revisions-registry.md
      - docx_plus.layout.columns: reference/layout-columns.md
      - docx_plus.layout.breaks: reference/layout-breaks.md
      - docx_plus.layout.settings: reference/layout-settings.md
      - docx_plus.layout.line_numbering: reference/layout-line-numbering.md
      - docx_plus.layout.borders: reference/layout-borders.md
      - docx_plus.bookmarks.anchor: reference/bookmarks-anchor.md
      - docx_plus.bookmarks.crossref: reference/bookmarks-crossref.md
      - docx_plus.bookmarks.read: reference/bookmarks-read.md
      - docx_plus.bookmarks.registry: reference/bookmarks-registry.md
      - docx_plus.notes.write: reference/notes-write.md
      - docx_plus.notes.read: reference/notes-read.md
      - docx_plus.notes.registry: reference/notes-registry.md
      - docx_plus.publishing.toc: reference/publishing-toc.md
      - docx_plus.publishing.captions: reference/publishing-captions.md
      - docx_plus.publishing.figures: reference/publishing-figures.md
  - Test Gaps: TEST_GAPS.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            docstring_style: google
            show_source: true
            show_root_heading: true
            show_root_full_path: true
            show_signature_annotations: true
            members_order: source
            separate_signature: true
            line_length: 80
            merge_init_into_class: true
            heading_level: 2

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.details

strict: true
